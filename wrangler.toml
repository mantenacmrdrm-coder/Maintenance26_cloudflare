name = "maintenance26-cloudflare"
compatibility_date = "2024-01-01"

# Cette ligne dit à Cloudflare où chercher les fichiers construits
pages_build_output_dir = ".next"

# On précise qu'on utilise le preset Next.js pour le build
[build]
command = "npm run build"

# On précise que le code source est dans le dossier src
[build.src]
dir = "src"